<!doctype html>
<html lang=ja>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
       /*@keyframes shake-animation {
        0%   { transform: translateX(0); }
        12%  { transform: translateX(-12px); }
        25%  { transform: translateX(10px); }
        37%  { transform: translateX(-8px); }
        50%  { transform: translateX(6px); }
        62%  { transform: translateX(-4px); }
        75%  { transform: translateX(2px); }
        87%  { transform: translateX(-1px); }
        100% { transform: translateX(0); }
      }*/
      @keyframes shake-animation{
        0%   {transform:translateX(0);}
        10%  {transform:translateX(-18px);}
        20%  {transform:translateX(16px);}
        30%  {transform:translateX(-12px);}
        40%  {transform:translateX(10px);}
        50%  {transform:translateX(-8px);}
        60%  {transform:translateX(6px);}
        70%  {transform:translateX(-4px);}
        80%  {transform:translateX(2px);}
        90%  {transform:translateX(-1px);}
        100% {transform:translateX(0);}
      }

      body{
        margin:0;
        padding:0;
        display:flex;
        flex-direction: column;
        min-height:100vh;
        height:100vh;
        overflow:auto;
      }
      header{
        background-color:#333;
        padding:8px;
        display:flex;
        justify-content:center;
        column-gap:16px;
        box-shadow:0 4px 8px rgba(0,0,0,0.2);
        z-index:255;
        min-width:100vw;
        width:100%;
      }
      .slcbtn{
        background-color:#6e6e6e;
        color:#d7faf1;
        border:none;
        padding:8px 16px;
        font-size:16px;
        border-radius:4px;
        transition:background-color 0.4s,transform 0.2s;
      }
      .slcbtn[aria-disabled="true"]:hover{
        cursor:not-allowed !important;
      }
      .slcbtn:not([aria-disabled="true"]):hover{
        background-color:#999;
        cursor:pointer !important;
      }
      /*.slcbtn:disabled:active{
        animation: shake-animation 0.6s ease-in-out;
      }*/
      .shake{
        animation: shake-animation 0.8s ease-in-out;
      }
      .slcbtn.active{
        background-color:#62c48e;
        color:#12343e;
        box-shadow:inset 0 4px 8px rgba(0,0,0,0.3)
      }
      .slcbtn:not([aria-disabled="true"]):active{
        transform:scale(0.96)
      }
      #iframeViewer{
        flex:1;
        width:100%;
        border:none;
      }
      iframe{
        width:100%;
        height:100%;
        border:none;
      }
      a{
        color:#2196f3;
      }
    </style>
  </head>
  <body>
    <header>
      <button class="slcbtn" id="nv">自然通風乾湿計用湿度表</button>
      <button class="slcbtn" id="ap">通風乾湿計用湿度表</button>
    </header>
    <div id="iframeViewer">
      <iframe id="nvFrame" style="display:none"></iframe>
      <iframe id="apFrame" style="display:none"></iframe>
      <p id="loading">読み込み中...(自動で読み込まれない場合は<a href="javascript:userOnclick()">こちら</a>をおしてください。)</p>
      <p id="offline" style="display:none">The file was not found or a timeout occurred. Please check your network connection and try again.</p>
    </div>

    <script>
      const nv=document.getElementById("nv")//自然通風乾湿計用湿度表
      const ap=document.getElementById("ap")//通風乾湿計用湿度表
      const nvf=document.getElementById("nvFrame")
      const apf=document.getElementById("apFrame")
      const _offline=document.getElementById("offline")
      const _loading=document.getElementById("loading")
      const prm=new URLSearchParams(location.search)
      let viewer;
      let timeoutId=null
      let disabled={nv:false,ap:false}

      function load_(url,elm){
        elm.src=url
      }
      function changeHash(id,val=""){
        if(id===1){//通風乾湿計用湿度表
          if(apf.src){
            apf.contentWindow.location.hash=val
            document.body.style.cursor="default"
            nv.style.cursor="default"
            ap.style.cursor="default"
            nv.ariaDisabled=false
            ap.ariaDisabled=true
            disabled.nv=false
            disabled.ap=true
          }else{
            timeoutId=setTimeout(()=>{
              document.body.style.cursor="default"
              nv.style.cursor="default"
              ap.style.cursor="default"
              nv.ariaDisabled=false
              ap.ariaDisabled=false
              disabled.nv=false
              disabled.ap=false
              apf.src="about:blank"
              apf.style.display="none"
              _offline.style.display="block"
            },5000)
            apf.src="./humidityTable/aspirated.html"+val
          }
        }else{//自然通風乾湿計用湿度表
          if(nvf.src){
            nvf.contentWindow.location.hash=val
            document.body.style.cursor="default"
            nv.style.cursor="default"
            ap.style.cursor="default"    
            nv.ariaDisabled=true
            ap.ariaDisabled=false
            disabled.nv=true
            disabled.ap=true
          }else{
            timeoutId=setTimeout(()=>{
              document.body.style.cursor="default"
              nv.style.cursor="default"
              ap.style.cursor="default"
              nv.ariaDisabled=false
              ap.ariaDisabled=false
              disabled.nv=false
              disabled.ap=false
              nvf.src="about:blank"
              nvf.style.display="none"
              _offline.style.display="block"
            },5000)
            nvf.src="./humidityTable/naturalVentilation.html"+val
          }
        }
        _loading.style.display="none"
      }
      function _changeiframe(id){
        if (id===1){
          changeHash(id)
          nvf.style.display="none"
          apf.style.display="block"
          nv.classList.remove("active")
          ap.classList.add("active")
          changeHash(id,location.hash)
        }else{
          changeHash(id)
          apf.style.display="none"
          nvf.style.display="block"
          ap.classList.remove("active")
          nv.classList.add("active")
          changeHash(id,location.hash)
        }
        viewer=id
      }
      nv.addEventListener("click",()=>{
        if (disabled.nv){return}
        if (nv.classList.contains("active")){
          nv.classList.add("shake")
          setTimeout(()=>{
            nv.classList.remove("shake")
          },1000)
          return
        }
        document.body.style.cursor="wait"
        nv.style.cursor="wait"
        ap.style.cursor="wait"
        nv.ariaDisabled=true
        ap.ariaDisabled=true
        disabled.nv=true
        disabled.ap=true
        _changeiframe(0)
      })
      ap.addEventListener("click",()=>{
        if (disabled.ap){return}
        if (ap.classList.contains("active")){
          ap.classList.add("shake")
          setTimeout(()=>{
            ap.classList.remove("shake")
          },1000)
        }
        document.body.style.cursor="wait"
        nv.style.cursor="wait"
        ap.style.cursor="wait"
        nv.ariaDisabled=true
        ap.ariaDisabled=true
        disabled.nv=true
        disabled.ap=true
        _changeiframe(1)
      })
      nvf.addEventListener("load",()=>{
        clearTimeout(timeoutId)
        document.body.style.cursor="default"
        nv.style.cursor="default"
        ap.style.cursor="default"
        nv.ariaDisabled=true
        ap.ariaDisabled=false
        disabled.nv=true
        disabled.ap=false
        changeHash(0,location.hash)
      })
      apf.addEventListener("load",()=>{
        clearTimeout(timeoutId)
        document.body.style.cursor="default"
        nv.style.cursor="default"
        ap.style.cursor="default"
        nv.ariaDisabled=false
        ap.ariaDisabled=true
        disabled.nv=false
        disabled.ap=true
        changeHash(1,location.hash)
      })
      window.addEventListener("hashchange",()=>{
        changeHash(viewer,location.hash)
      })
      function userOnclick(){
        const mode=(prm.get("mode")??"").toLowerCase()
        if (mode=="1"||mode=="aspirated"||mode=="aspirate"||mode=="asp"){
          ap.click()
          changeHash(1,location.hash)
        }else{
          nv.click()
          changeHash(0,location.hash)
        }
      }
      userOnclick()
      
    </script>
  </body>
</html>
